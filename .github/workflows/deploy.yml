name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_GH_OWNER:        ${{ secrets.VITE_GH_OWNER }}
          VITE_GH_REPO:         ${{ secrets.VITE_GH_REPO }}
          VITE_GH_TOKEN:        ${{ secrets.VITE_GH_TOKEN }}
          VITE_GH_CONTENT_PATH: ${{ vars.VITE_GH_CONTENT_PATH || 'frontend/public/content.json' }}
          VITE_GH_UPLOADS_DIR:  ${{ vars.VITE_GH_UPLOADS_DIR  || 'frontend/public/uploads' }}
          VITE_ADMIN_HASH:      ${{ secrets.VITE_ADMIN_HASH }}
          VITE_WEB3FORMS_KEY:   ${{ secrets.VITE_WEB3FORMS_KEY }}
          VITE_BASE_URL:        ${{ vars.VITE_BASE_URL || '/' }}
          VITE_CHAT_API_SECRET: ${{ secrets.VITE_CHAT_API_SECRET }}
          VITE_API_BASE:        ${{ vars.VITE_API_BASE }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # The actual live app (backend + the frontend it serves at
  # emergent-interaction-lab.fly.dev) only ever moved via a manual
  # `fly deploy` run from someone's machine — this workflow only ever
  # published the static GitHub Pages mirror. That gap meant a merged PR
  # could look "deployed" (this workflow green) while the real backend
  # (and the app.db it seeds on startup) was still running old code, with
  # nothing surfacing the mismatch. Confirmed 2026-07-12: a billing.rs
  # change shipped this way with the Pages mirror pointed at the stale
  # backend for hours before anyone noticed the seeded products were
  # missing. Runs independently of the two Pages jobs above (`needs:` is
  # deliberately omitted) since Fly builds its own image from the repo's
  # Dockerfile — it doesn't consume the `build` job's artifact.
  deploy-fly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # eil-hermes — the standalone, always-on Hermes host (deploy/hermes-standalone/),
  # a SEPARATE Fly app from the one deploy-fly above targets. Reuses the same
  # FLY_API_TOKEN secret: a Fly personal-access-token is scoped to the whole
  # org/account, not one app, so the token that already deploys
  # emergent-interaction-lab can deploy this one too. Added 2026-07-14
  # because the only local flyctl session available at the time had lost its
  # auth token entirely (`no access token available`, no working `fly auth
  # login` path in that environment) — CI deploying via its own independent
  # credential was the way to actually ship this without a human re-running
  # an interactive browser login. `continue-on-error`-free on purpose: if
  # FLY_API_TOKEN turns out not to cover this app (e.g. a more narrowly-
  # scoped deploy token), this job should fail loudly, not hide it.
  deploy-eil-hermes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy eil-hermes to Fly.io
        run: flyctl deploy --remote-only --config deploy/hermes-standalone/fly.toml --dockerfile deploy/hermes-standalone/Dockerfile
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
