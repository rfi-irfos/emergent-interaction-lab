name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_GH_OWNER:        ${{ secrets.VITE_GH_OWNER }}
          VITE_GH_REPO:         ${{ secrets.VITE_GH_REPO }}
          VITE_GH_TOKEN:        ${{ secrets.VITE_GH_TOKEN }}
          VITE_GH_CONTENT_PATH: ${{ vars.VITE_GH_CONTENT_PATH || 'frontend/public/content.json' }}
          VITE_GH_UPLOADS_DIR:  ${{ vars.VITE_GH_UPLOADS_DIR  || 'frontend/public/uploads' }}
          VITE_ADMIN_HASH:      ${{ secrets.VITE_ADMIN_HASH }}
          VITE_WEB3FORMS_KEY:   ${{ secrets.VITE_WEB3FORMS_KEY }}
          VITE_BASE_URL:        ${{ vars.VITE_BASE_URL || '/' }}
          # SECURITY (C1, 2026-07-19): VITE_CHAT_API_SECRET is DELIBERATELY NOT
          # injected into the public GitHub Pages build. It is the same value the
          # backend uses for the x-chat-secret admin gate (authz.rs) — baking it
          # into a client-downloadable JS bundle let anyone read it from the
          # public mirror and call the fly.dev admin API. The GH Pages mirror is
          # read-only (no backend reachable from it), so it needs no admin secret.
          # Do NOT re-add this line. If a mirror ever needs admin capability,
          # decouple the browser call-auth from the server admin secret first.
          VITE_API_BASE:        ${{ vars.VITE_API_BASE }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # The actual live app (backend + the frontend it serves at
  # emergent-interaction-lab.fly.dev) only ever moved via a manual
  # `fly deploy` run from someone's machine — this workflow only ever
  # published the static GitHub Pages mirror. That gap meant a merged PR
  # could look "deployed" (this workflow green) while the real backend
  # (and the app.db it seeds on startup) was still running old code, with
  # nothing surfacing the mismatch. Confirmed 2026-07-12: a billing.rs
  # change shipped this way with the Pages mirror pointed at the stale
  # backend for hours before anyone noticed the seeded products were
  # missing. Runs independently of the two Pages jobs above (`needs:` is
  # deliberately omitted) since Fly builds its own image from the repo's
  # Dockerfile — it doesn't consume the `build` job's artifact.
  deploy-fly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # A deploy-eil-hermes job (same shape as deploy-fly above, targeting
  # deploy/hermes-standalone/fly.toml) was tried here 2026-07-14 as a way to
  # ship the standalone Hermes host without a working local `fly auth`
  # session. Reverted the same day: this FLY_API_TOKEN is scoped to
  # emergent-interaction-lab specifically, not the whole org/account as
  # hoped — the job failed with a clean "Error: unauthorized" on the very
  # first run, config validated fine, just not authorized for this app. A
  # permanently-red CI job on every future push is worse than not having
  # this automation at all. Deploying eil-hermes needs either a real
  # `fly auth login`/token for that app specifically, or a second,
  # eil-hermes-scoped FLY_API_TOKEN secret added to this repo.
