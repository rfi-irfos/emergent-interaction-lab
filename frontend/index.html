<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        var q = window.location.search;
        if (q && q[1] === 'p') {
          var params = q.slice(1).split('&');
          var path = params[0].slice(2).replace(/~and~/g, '&');
          var query = params[1] ? '?' + params[1].slice(2).replace(/~and~/g, '&') : '';
          var hash = window.location.hash || '';
          window.history.replaceState(null, null, window.location.pathname + path + query + hash);
        }
      })();
    </script>
    <script>
      (function() {
        var m = /[?&]theme=(light|dark|hc)/.exec(window.location.search)
        if (m) localStorage.setItem('rfi-theme', m[1])
      })();
    </script>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
