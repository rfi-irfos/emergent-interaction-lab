<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        var q = window.location.search;
        if (q && q[1] === 'p') {
          var params = q.slice(1).split('&');
          var path = params[0].slice(2).replace(/~and~/g, '&');
          var query = params[1] ? '?' + params[1].slice(2).replace(/~and~/g, '&') : '';
          var hash = window.location.hash || '';
          window.history.replaceState(null, null, window.location.pathname + path + query + hash);
        }
      })();
    </script>
    <script>
      (function() {
        var m = /[?&]theme=(light|dark|hc)/.exec(window.location.search)
        if (m) localStorage.setItem('rfi-theme', m[1])
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Static fallback shown until React hydrates and PublicSite's own
         document.title effect takes over from content.meta.title (see
         PublicSite.tsx) — was left as Vite's literal scaffold placeholder
         since this project's init, so every visitor saw a bare "frontend"
         tab title for however long the JS bundle took to load. -->
    <title>Emergent Interaction Lab</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
