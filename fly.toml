app = "emergent-interaction-lab"
primary_region = "fra"

[build]

[env]
  PORT = "3000"
  STATIC_DIR = "/app/dist"
  # /app/data is the only mounted persistent volume (eil_data below) — an
  # UPLOADS_DIR outside it lives in the container's writable layer, which
  # resets on every deploy AND on any host-level machine replacement (this
  # app runs auto_stop_machines/min_machines_running=0, so that's not just
  # a deploy-time risk). Found 2026-07-11 when a just-uploaded logo 404'd
  # on the live site: /app/uploads was completely empty on inspection,
  # meaning any upload made before the most recent deploy/restart was
  # already gone. Moved under the mounted volume so it actually persists.
  UPLOADS_DIR = "/app/data/uploads"
  CONTENT_PATH = "/app/data/content.json"
  DB_PATH = "/app/data/app.db"
  REDIRECT_URI = "https://emergent-interaction-lab.fly.dev/auth/callback"
  # SECURITY (C2, 2026-07-19): DEV_MODE MUST be false in production. When true,
  # auth::google_login short-circuits BEFORE any Google OAuth / ALLOWED_EMAIL
  # check and mints a valid rfi_session admin cookie for ANY caller — a live
  # unauthenticated admin session + full site takeover via PUT /api/content.
  # The Website Kit save path must authenticate via real Google OAuth, not this
  # dev bypass. Do NOT set this to "true" on the live machine.
  DEV_MODE = "false"
  # Belt-and-suspenders alongside the main.rs code fix (2026-07-10): without
  # RUST_LOG set, tracing_subscriber's EnvFilter::from_default_env()
  # defaults to ERROR-only, silently dropping every info!/warn! line in
  # production — including the "chat round served by model X" line needed
  # to diagnose which model actually serves requests. main.rs now defaults
  # to "info" in code even without this, but setting it explicitly here too
  # means it survives even if that code default is ever changed or removed.
  RUST_LOG = "info"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[mounts]]
  source = "eil_data"
  destination = "/app/data"

[[vm]]
  # Raised from 512mb when the Hermes research agent was bundled into the image
  # (see Dockerfile + backend/src/hermes.rs): the machine now runs the Rust
  # backend AND a Python agent process, and 512mb does not hold both — Hermes
  # would be OOM-killed, taking the Forschung tab's second engine down with it.
  #
  # If Hermes is not wanted, HERMES_ENABLED=0 keeps the process from starting and
  # this can go back to 512mb — the backend then simply never offers the engine.
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
