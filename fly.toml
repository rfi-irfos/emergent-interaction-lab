app = "emergent-interaction-lab"
primary_region = "fra"

[build]

[env]
  PORT = "3000"
  STATIC_DIR = "/app/dist"
  UPLOADS_DIR = "/app/uploads"
  CONTENT_PATH = "/app/data/content.json"
  REDIRECT_URI = "https://emergent-interaction-lab.fly.dev/auth/callback"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "eil_data"
  destination = "/app/data"

[[mounts]]
  source = "eil_uploads"
  destination = "/app/uploads"
